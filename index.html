<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light">
  <title>El Morjene Market - Mobile</title>
  <link rel="stylesheet" href="css/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800;0,900;1,700;1,800;1,900&family=Nunito:wght@600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="preload" as="style">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800;0,900;1,700;1,800;1,900&family=Nunito:wght@600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app"></div>

  <!-- Netlify Form - Hidden -->
  <form name="commande-el-morjene" method="POST" netlify hidden>
    <input type="text" name="nom" />
    <input type="email" name="email" />
    <input type="tel" name="tel" />
    <input type="text" name="adresse" />
    <textarea name="note"></textarea>
    <textarea name="panier"></textarea>
    <input type="text" name="total" />
  </form>

  <script src="js/app.js"></script>
</body>
</html>
